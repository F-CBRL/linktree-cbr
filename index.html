<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linktree</title>
    
    <!-- link css -->
    <link rel="stylesheet" href="sytle.css">
    <link rel="stylesheet" href="./copy_link/copy.css"> <!-- tambahkan ini untuk style tombol copy -->
    
    <!-- link font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- link animasi -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>

<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="images/black-cat-watching-sky-moewalls-com.mp4" type="video/mp4">
      </video>
           
      
    <div class="custom-container animate__animated animate__zoomIn">
        
        <!-- profile picture -->
        <div class="profile">
            <img src="images/pp.jpeg" alt="foto" class="animate__animated animate__bounce">
            <p>CBRVerse</p>
        </div>
        <!-- profile picture end -->

        <!-- link tree button -->
        <div class="link">
            
            <!-- Tombol Spotify dengan tombol copy di ujung -->
            <a href="https://open.spotify.com/user/31dgkznpfplpcezehoaaekec76ce?si=eecb4fa56e6a4531"  
               target="_blank" 
               class="link-button animate__animated animate__fadeInDown animate__delay-0.5s">
                <span class="link-text">spotify</span>
                <span id="copy-container" class="copy-area"></span>
            </a>

            <!-- Tombol GitHub biasa -->
            <a href="https://github.com/F-CBRL" 
            target="_blank" 
            class="link-button animate__animated animate__fadeInDown animate__delay-1s">
             <span class="link-text">github</span>
             <span id="copy-container-github" class="copy-area"></span>
         </a>
         
            <!-- icon start -->
            <div id="icon-container" class="animate__animated animate__zoomIn"></div>
        </div>
        <!-- link tree end -->

        <!-- footer -->
        <div class="footer">
            <i>Made with ❤️ by CBRL</i>
        </div>
        <!-- footer end -->

    </div>

    <script src="script.js"></script>

   
</body>
</html>
